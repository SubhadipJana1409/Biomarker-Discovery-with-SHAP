# ============================================================
#  SHAP Biomarker Discovery — Pipeline Configuration
#  Edit this file to tune the pipeline without touching code.
# ============================================================

data:
  n_samples: 400          # total samples (split 50/50 IBD / Healthy)
  random_seed: 42
  pseudo_count: 0.5       # CLR pseudo-count for zero handling
  prevalence_filter: 0.05 # drop taxa present in < 5% of samples
  # Set to a path to use your own OTU table (CSV, rows=samples, cols=taxa)
  # otu_table_path: null
  # metadata_path: null
  # label_column: "diagnosis"
  # positive_class: "IBD"

models:
  random_forest:
    n_estimators: 400
    max_depth: 8
    min_samples_leaf: 3
    n_jobs: -1
  xgboost:
    n_estimators: 200
    max_depth: 5
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    eval_metric: "logloss"
  cross_validation:
    n_splits: 5
    shuffle: true
  test_size: 0.25

shap:
  max_display: 20       # taxa shown in summary/beeswarm
  sample_idx: 5         # sample index for waterfall plot (within IBD test set)

output:
  dir: "outputs"
  dpi: 150
  figure_format: "png"
  save_biomarker_table: true

logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(message)s"
